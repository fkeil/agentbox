id: hermes
display_name: Hermes
base_image: ubuntu:22.04

install:
  method: script
  url: https://hermes-agent.nousresearch.com/install.sh
  apt_deps:
    - curl
    - ca-certificates
    - jq

supported_providers:
  - openai
  - openai-compatible
  - anthropic

auth:
  openai:
    api_key_env: OPENAI_API_KEY
    base_url_env: OPENAI_BASE_URL
  openai-compatible:
    api_key_env: OPENAI_API_KEY
    base_url_env: OPENAI_BASE_URL
  anthropic:
    api_key_env: ANTHROPIC_API_KEY

launch:
  command: [hermes, run]
  args: []

healthcheck: ["hermes", "--version"]

oauth:
  supported: false

# Static env vars always injected — disables Hermes' own Docker sandbox so it
# uses local process execution inside the agentbox container instead.
env:
  HERMES_SANDBOX: local
  HERMES_NON_INTERACTIVE: "1"

daemon:
  requires_lifecycle: persistent
  # nested_sandbox is kept for clarity; manifest.env above is the primary mechanism.
  nested_sandbox: local
  setup:
    # Write a minimal Hermes config file non-interactively.
    # Hermes reads ~/.hermes/config.json at startup.
    method: config_file
    config_path: /root/.hermes/config.json
    config_template: |
      {
        "model": {
          "provider": "{{PROVIDER_TYPE}}",
          "name": "{{MODEL}}",
          "api_key": "{{API_KEY}}",
          "base_url": "{{BASE_URL}}"
        },
        "sandbox": {
          "backend": "local"
        },
        "server": {
          "port": 8080
        }
      }
  ports:
    - container_port: 8080
      host_port: 8080
      optional: false

workdir: /workspace
